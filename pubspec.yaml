name: sigara_defteri
description: "Sigara ve vape tüketimini yargılamadan takip eden minimalist günlük uygulaması."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Database
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Charts
  fl_chart: ^0.70.2

  # Monetization
  purchases_flutter: ^8.6.1

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Home Widget
  home_widget: ^0.7.0

  # Settings storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
